spring.application.name=GamesDoneQuack

spring.datasource.url=jdbc:postgresql://localhost:5432/gamesdonequack_db?charSet=UTF8
spring.datasource.username=dev_db_user
spring.datasource.password=temp

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/schema-index.sql

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true